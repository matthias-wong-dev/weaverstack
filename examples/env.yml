# A hosts file. Everything here is a convenience — every host below is equally
# expressible as a Python constructor, and nothing requires this file to exist.
#
#   weaver wipe --target Sales_LH --host MyLocal --hosts examples/env.yml

hosts:

  # A local root standing in for a workspace. Folder and Delta work here;
  # there is no local SQL, so a Warehouse target is refused rather than skipped.
  MyLocal:
    type: Local
    root: .local
    weaver_lakehouse: Weaver

  # One Fabric workspace. Item names are unique within it, which is why
  # Lakehouses and Warehouses need no configuration of their own — they are
  # named directly wherever they are used.
  MyFabric:
    type: Fabric
    workspace: Weaver
    weaver_lakehouse: Weaver
    # The Fabric Environment Weaver is installed into, by `weaver install`. A
    # Livy session attaches it and imports the installed package — nothing is
    # copied into the workspace. Lower-case by convention, like a package name.
    fabric_environment: weaver

    # warehouse_config:                   # per-Warehouse technical settings
    #   Reporting_WH:
    #     degrees_of_parallelism: 8
